<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#060a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #060a0f; color: #e0e8f0; -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }

    ::-webkit-scrollbar { width: 4px; }

    @keyframes flashGreen { 0%,100%{background:transparent} 40%{background:rgba(0,255,136,0.15)} }
    @keyframes shakeRed   { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .flash-tp { animation: flashGreen 0.55s ease 3; }
    .shake-sl { animation: shakeRed 0.35s ease 2; }
  </style>

<body>
<div id="app"></div>
<script>
'use strict';

/* ═══════════════════════════════════════════════
   1. CORE / STATE
   ═══════════════════════════════════════════════ */

class EventEmitter {
  constructor() { this._l = {}; }
  on(ev, fn) {
    if (!this._l[ev]) this._l[ev] = [];
    this._l[ev].push(fn);
    return () => { this._l[ev] = (this._l[ev] || []).filter(f => f !== fn); };
  }
  off(ev, fn) { this._l[ev] = (this._l[ev] || []).filter(f => f !== fn); }
  emit(ev, data) {
    (this._l[ev]  || []).slice().forEach(fn => fn(data));
    (this._l['*'] || []).slice().forEach(fn => fn(ev, data));
  }
}

class AppState extends EventEmitter {
  constructor() {
    super();
    this._s = {
      dailyPnl: 0, dailyTarget: 100, tradeCount: 0,
      positions: [],       // aktif pozisyonlar, max 5
      autoMode: false,
      setups: [], prices: {},
      connected: false, lastUpdate: null,
    };
  }

  get(key) { return key ? this._s[key] : { ...this._s }; }

  setState(patch) {
    const prev = { ...this._s };
    this._s = { ...this._s, ...patch };
    Object.keys(patch).forEach(k => { if (prev[k] !== this._s[k]) this.emit('change:' + k, this._s[k]); });
    this.emit('change', { prev, next: { ...this._s }, patch });
  }

  // Pozisyon ekle — max 5, başarılı ise pozisyon objesi döner, dolu ise null
  addPosition(d) {
    if (this._s.positions.length >= 5) return null;
    const pos = {
      ...d,
      id: Date.now() + '_' + Math.random().toString(36).slice(2),
      openTime: Date.now(),
      unrealizedPnl: 0,
      distanceToTp: null,
      distanceToSl: null,
    };
    this.setState({ positions: [...this._s.positions, pos] });
    return pos;
  }

  // Pozisyon kaldır
  removePosition(id) {
    this.setState({ positions: this._s.positions.filter(p => p.id !== id) });
  }

  // Fiyat güncelle — tüm eşleşen pozisyonları günceller
  updatePrice(coin, price) {
    this._s.prices = { ...this._s.prices, [coin]: price };
    let changed = false;
    this._s.positions = this._s.positions.map(pos => {
      if (pos.coin !== coin) return pos;
      changed = true;
      const diff = pos.side === 'LONG' ? price - pos.entry : pos.entry - price;
      const uPnl = parseFloat(((diff / pos.entry) * pos.size * pos.leverage).toFixed(2));
      return {
        ...pos, currentPrice: price, unrealizedPnl: uPnl,
        distanceToTp: pos.side === 'LONG' ? pos.tp - price : price - pos.tp,
        distanceToSl: pos.side === 'LONG' ? price - pos.sl : pos.sl - price,
      };
    });
    this.emit('price', { coin, price });
    if (changed) this.emit('change:positions', this._s.positions);
    this._s.lastUpdate = Date.now();
  }

  resetDay() { this.setState({ dailyPnl: 0, tradeCount: 0, setups: [] }); this.emit('day:reset'); }
}

const state = new AppState();

/* ═══════════════════════════════════════════════
   2. CORE / STORAGE
   ═══════════════════════════════════════════════ */

const storage = {
  get(k, fb = null) { try { const r = localStorage.getItem('spx_' + k); return r !== null ? JSON.parse(r) : fb; } catch(_) { return fb; } },
  set(k, v) { try { localStorage.setItem('spx_' + k, JSON.stringify(v)); return true; } catch(_) { return false; } },
  remove(k) { localStorage.removeItem('spx_' + k); },
};

/* ═══════════════════════════════════════════════
   3. MODULES / CALCULATOR
   ═══════════════════════════════════════════════ */

const TAKER_FEE_RATE = 0.0005;

function calculate({ entry, size, leverage, side }) {
  if (!entry || entry <= 0) throw new Error('Geçersiz giriş fiyatı');
  if (!size || size < 100 || size > 300) throw new Error('Pozisyon $100–$300 aralığında olmalı');
  if (!leverage || leverage < 5 || leverage > 20) throw new Error('Kaldıraç 5x–20x aralığında olmalı');
  if (side !== 'LONG' && side !== 'SHORT') throw new Error('Yön LONG veya SHORT olmalı');

  const totalFee    = size * TAKER_FEE_RATE * 2;
  const grossTarget = 1 + totalFee;
  const moveRatio   = grossTarget / (size * leverage);

  let tp, sl;
  if (side === 'LONG') { tp = entry * (1 + moveRatio); sl = entry * (1 - moveRatio * 1.5); }
  else                 { tp = entry * (1 - moveRatio); sl = entry * (1 + moveRatio * 1.5); }

  const tpDist = Math.abs(tp - entry);
  const slDist = Math.abs(sl - entry);
  const prec   = entry >= 1000 ? 2 : entry >= 1 ? 4 : 6;

  return {
    tp: _r(tp, prec), sl: _r(sl, prec),
    totalFee: _r(totalFee, 4), grossTarget: _r(grossTarget, 4),
    moveRatio: _r(moveRatio, 6), tpDistance: _r(tpDist, prec),
    slDistance: _r(slDist, prec), riskReward: _r(tpDist / slDist, 3),
  };
}

function calcLivePnl(pos, currentPrice) {
  const diff = pos.side === 'LONG' ? currentPrice - pos.entry : pos.entry - currentPrice;
  return {
    unrealizedPnl:    _r((diff / pos.entry) * pos.size * pos.leverage, 2),
    unrealizedPnlPct: _r((diff / pos.entry) * pos.leverage * 100, 2),
    distanceToTp:     pos.side === 'LONG' ? pos.tp - currentPrice : currentPrice - pos.tp,
    distanceToSl:     pos.side === 'LONG' ? currentPrice - pos.sl : pos.sl - currentPrice,
  };
}

function _r(v, d) { return parseFloat(v.toFixed(d)); }

/* ═══════════════════════════════════════════════
   4. MODULES / COUNTER
   ═══════════════════════════════════════════════ */

const DAILY_TARGET = 100;

function initCounter() {
  const saved = storage.get('daily');
  if (saved && saved.date === _today()) {
    state.setState({ dailyPnl: saved.dailyPnl ?? 0, tradeCount: saved.tradeCount ?? 0 });
  } else {
    _persistCounter();
  }
}

function recordTrade(pnl) {
  const newPnl = parseFloat((state.get('dailyPnl') + pnl).toFixed(2));
  const newCnt = state.get('tradeCount') + 1;
  state.setState({ dailyPnl: newPnl, tradeCount: newCnt });
  _persistCounter();
  if (newPnl >= DAILY_TARGET) state.emit('counter:target_reached', { dailyPnl: newPnl, tradeCount: newCnt });
}

function getProgress()     { return Math.min(state.get('dailyPnl') / DAILY_TARGET, 1); }
function getRemaining()    { return Math.max(DAILY_TARGET - state.get('dailyPnl'), 0); }
function isTargetReached() { return state.get('dailyPnl') >= DAILY_TARGET; }

function _today()          { return new Date().toISOString().slice(0, 10); }
function _persistCounter() { storage.set('daily', { date: _today(), dailyPnl: state.get('dailyPnl'), tradeCount: state.get('tradeCount') }); }

/* ═══════════════════════════════════════════════
   5. MODULES / HISTORY
   ═══════════════════════════════════════════════ */

function addToHistory(trade) {
  const h = storage.get('history') || {};
  const today = _today();
  if (!h[today]) h[today] = [];
  h[today].unshift({
    coin:       trade.coin,
    side:       trade.side,
    entry:      trade.entry,
    exitPrice:  trade.exitPrice,
    pnl:        trade.pnl,
    duration:   trade.duration,
    gateScore:  trade.gateScore ?? null,
    reason:     trade.reason,    // 'tp' | 'sl' | 'manual'
    isAuto:     trade.isAuto ?? false,
    closedAt:   Date.now(),
  });
  // Günde max 500 kayıt
  if (h[today].length > 500) h[today] = h[today].slice(0, 500);
  storage.set('history', h);
  state.emit('history:updated', h[today]);
}

function getTodayHistory() {
  const h = storage.get('history') || {};
  return h[_today()] || [];
}

function getDailyReport() {
  const trades = getTodayHistory();
  if (!trades.length) return null;
  const winners  = trades.filter(t => t.pnl > 0);
  const losers   = trades.filter(t => t.pnl <= 0);
  const netPnl   = _r(trades.reduce((s, t) => s + t.pnl, 0), 2);
  const avgDur   = Math.round(trades.reduce((s, t) => s + (t.duration || 0), 0) / trades.length / 1000);
  const best     = trades.reduce((b, t) => t.pnl > b.pnl ? t : b, trades[0]);
  const worst    = trades.reduce((w, t) => t.pnl < w.pnl ? t : w, trades[0]);
  return { total: trades.length, winners: winners.length, losers: losers.length,
           winRate: _r(winners.length / trades.length * 100, 1), netPnl, avgDur, best, worst };
}

/* ═══════════════════════════════════════════════
   6. UI / ALERTS
   ═══════════════════════════════════════════════ */

let _audioCtx = null;

function _getCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function _beep({ freq = 880, duration = 120, volume = 0.4, type = 'sine' } = {}) {
  try {
    const ctx = _getCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration / 1000);
  } catch(e) { console.warn('[alerts]', e.message); }
}

function _vib(p) { if (navigator.vibrate) navigator.vibrate(p); }

function alertEntry()         { _beep({freq:1047,duration:100,volume:0.5}); setTimeout(()=>_beep({freq:1319,duration:150,volume:0.6}),130); _vib([100,50,200]); }
function alertReady()         { _beep({freq:659,duration:120,volume:0.35}); _vib(80); }
function alertTpHit()         { _beep({freq:880,duration:80,volume:0.5}); setTimeout(()=>_beep({freq:1047,duration:80,volume:0.55}),100); setTimeout(()=>_beep({freq:1319,duration:120,volume:0.6}),200); _vib([80,40,80,40,200]); }
function alertSlHit()         { _beep({freq:440,duration:150,volume:0.5,type:'square'}); setTimeout(()=>_beep({freq:330,duration:200,volume:0.45,type:'square'}),170); _vib([200,100,200]); }
function alertSlWarning()     { _beep({freq:550,duration:100,volume:0.5,type:'square'}); setTimeout(()=>_beep({freq:440,duration:120,volume:0.5,type:'square'}),140); _vib([150,80,150]); }
function alertTargetReached() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>_beep({freq:f,duration:150,volume:0.6}),i*160)); _vib([100,50,100,50,100,50,400]); }
function alertDisconnected()  { _beep({freq:220,duration:300,volume:0.3,type:'sawtooth'}); _vib(50); }

function flashGreen() {
  const a = document.getElementById('app');
  a.classList.remove('flash-tp'); void a.offsetWidth;
  a.classList.add('flash-tp');
  setTimeout(() => a.classList.remove('flash-tp'), 1700);
}
function shakeRed() {
  const a = document.getElementById('app');
  a.classList.remove('shake-sl'); void a.offsetWidth;
  a.classList.add('shake-sl');
  setTimeout(() => a.classList.remove('shake-sl'), 750);
}

function initAudio() {
  const r = () => _getCtx();
  document.addEventListener('touchstart', r, { once: true });
  document.addEventListener('click',      r, { once: true });
}

/* ═══════════════════════════════════════════════
   7. CORE / BINANCE
   ═══════════════════════════════════════════════ */

const REST_BASE = 'https://fapi.binance.com';
const WS_BASE   = 'wss://fstream.binance.com';

const COINS = [
  'BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT',
  'DOGEUSDT','ADAUSDT','AVAXUSDT','LTCUSDT','LINKUSDT',
  'DOTUSDT','MATICUSDT','UNIUSDT','ATOMUSDT','NEARUSDT',
  'APTUSDT','ARBUSDT','OPUSDT','INJUSDT','SUIUSDT',
  'SEIUSDT','TIAUSDT','WLDUSDT','FETUSDT','AGIXUSDT',
  'RNDRUSDT','TRBUSDT','ORDIUSDT','SATSUSDT','1000PEPEUSDT',
];

async function _restGet(path, params = {}) {
  const url = new URL(REST_BASE + path);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  if (!res.ok) throw new Error('Binance REST ' + path + ' → ' + res.status);
  return res.json();
}

async function getFunding(symbol)      { const d = await _restGet('/fapi/v1/premiumIndex', { symbol }); return parseFloat(d.lastFundingRate); }
async function getOpenInterest(symbol) { const d = await _restGet('/fapi/v1/openInterest', { symbol }); return parseFloat(d.openInterest); }

async function getKlines(symbol, interval = '1m', limit = 25) {
  const raw = await _restGet('/fapi/v1/klines', { symbol, interval, limit });
  return raw.map(k => ({
    openTime: k[0], open:+k[1], high:+k[2], low:+k[3], close:+k[4],
    volume:+k[5], closeTime:k[6], takerBuyVolume:+k[9], takerSellVolume:+k[5]-+k[9],
  }));
}

let _ws = null, _reconnTimer = null, _reconnDelay = 2000;

function connectWs() {
  if (_ws && _ws.readyState === WebSocket.OPEN) return;
  _clearReconn();
  const streams = COINS.map(c => c.toLowerCase() + '@miniTicker').join('/');
  _ws = new WebSocket(WS_BASE + '/stream?streams=' + streams);
  _ws.onopen    = () => { _reconnDelay = 2000; state.setState({ connected: true }); };
  _ws.onmessage = ({ data }) => {
    try { const m = JSON.parse(data), t = m.data ?? m;
      if (t.e === '24hrMiniTicker') state.updatePrice(t.s, parseFloat(t.c)); } catch(_) {} };
  _ws.onerror   = () => {};
  _ws.onclose   = () => { state.setState({ connected: false }); alertDisconnected(); _scheduleReconn(); };
}

function disconnectWs() { _clearReconn(); if (_ws) { _ws.onclose = null; _ws.close(); _ws = null; } state.setState({ connected: false }); }
function _scheduleReconn() { _reconnTimer = setTimeout(() => { connectWs(); _reconnDelay = Math.min(_reconnDelay*2, 30000); }, _reconnDelay); }
function _clearReconn()    { if (_reconnTimer) { clearTimeout(_reconnTimer); _reconnTimer = null; } }

/* ═══════════════════════════════════════════════
   8. MODULES / SCANNER
   ═══════════════════════════════════════════════ */

const RSI_PERIOD = 14, VOLUME_MA_LEN = 20, TAKER_LOOKBACK = 3;
const TAKER_THRESHOLD = 1.3, VOLUME_MULT = 1.5, FUNDING_LIMIT = 0.0005;
const _oiCache = {};
let _scanning = false, _scanTimer = null;

async function evaluateCoin(symbol, side) {
  const klines = await getKlines(symbol, '1m', 25);
  const [funding, oi] = await Promise.all([getFunding(symbol), getOpenInterest(symbol)]);
  const closes = klines.map(k => k.close);
  const current = closes.at(-1), prev = closes.at(-2);

  const g1 = Math.abs(funding) < FUNDING_LIMIT;

  const oiPrev = _oiCache[symbol]?.value ?? oi;
  _oiCache[symbol] = { value: oi, time: Date.now() };
  const oiRising = oi > oiPrev, priceUp = current > prev;
  const g2 = side === 'LONG' ? oiRising && priceUp : oiRising && !priceUp;

  const last3 = klines.slice(-TAKER_LOOKBACK);
  const buyVol = last3.reduce((s,k) => s+k.takerBuyVolume, 0);
  const sellVol = last3.reduce((s,k) => s+k.takerSellVolume, 0);
  const takerRatio = sellVol > 0 ? buyVol / sellVol : 0;
  const g3 = side === 'LONG' ? takerRatio > TAKER_THRESHOLD : (1/Math.max(takerRatio,0.001)) > TAKER_THRESHOLD;

  const rsi = _calcRsi(closes, RSI_PERIOD);
  const momentum = closes.at(-1) > closes.at(-4);
  const g4 = side === 'LONG' ? (rsi>=45&&rsi<=70&&momentum) : (rsi>=30&&rsi<=55&&!momentum);

  const volumes = klines.map(k => k.volume);
  const lastVol = volumes.at(-1), maVol = _avg(volumes.slice(-VOLUME_MA_LEN-1,-1));
  const g5 = lastVol > maVol * VOLUME_MULT;

  const gateScore = [g1,g2,g3,g4,g5].filter(Boolean).length;
  const signal    = gateScore===5?'GİR':gateScore===4?'HAZIRLAN':'GIRME';

  const gateReasons = {
    g1: g1?'':funding>0?'Funding yüksek (+'+_r(funding*100,3)+'%)':'Funding düşük ('+_r(funding*100,3)+'%)',
    g2: g2?'':!oiRising?'OI düşüyor':side==='LONG'?'Fiyat aşağı':'Fiyat yukarı',
    g3: g3?'':(side==='LONG'?'Satış baskısı ('+_r(takerRatio,2)+'x)':'Alış baskısı ('+_r(takerRatio,2)+'x)'),
    g4: g4?'':(side==='LONG'?(rsi<45?'RSI düşük ('+_r(rsi,1)+')':rsi>70?'RSI yüksek ('+_r(rsi,1)+')':'Momentum yok'):(rsi<30?'RSI düşük ('+_r(rsi,1)+')':rsi>55?'RSI yüksek ('+_r(rsi,1)+')':'Momentum yok')),
    g5: g5?'':'Volume zayıf ('+_r(lastVol/Math.max(maVol,0.0001),2)+'x)',
  };

  return { coin:symbol, side, signal, gateScore, gates:{g1,g2,g3,g4,g5}, gateReasons,
           funding:_r(funding*100,4), oi:_r(oi,2), takerRatio:_r(takerRatio,3),
           rsi:_r(rsi,1), volume:_r(lastVol,2), volumeMa:_r(maVol,2), price:current, ts:Date.now() };
}

async function scanAll() {
  if (_scanning) return;
  _scanning = true;
  const results = [];
  for (let i = 0; i < COINS.length; i += 5) {
    const batch = COINS.slice(i, i+5);
    const settled = await Promise.allSettled(batch.flatMap(c => [evaluateCoin(c,'LONG'), evaluateCoin(c,'SHORT')]));
    settled.forEach(r => { if (r.status==='fulfilled') results.push(r.value); });
  }
  const best = {};
  results.forEach(r => { if (!best[r.coin] || r.gateScore > best[r.coin].gateScore) best[r.coin] = r; });
  const setups = Object.values(best).sort((a,b) => b.gateScore - a.gateScore);
  state.setState({ setups });
  _scanning = false;
  state.emit('scanner:done', { count: setups.length, ts: Date.now() });
  // Otomatik mod hook
  if (state.get('autoMode')) _autoTrade(setups);
  return setups;
}

function _autoTrade(setups) {
  const positions = state.get('positions');
  if (positions.length >= 5) return;
  const openCoins = new Set(positions.map(p => p.coin));
  const settings  = storage.get('settings') || { size: 100, leverage: 10 };
  let opened = 0, available = 5 - positions.length;

  for (const setup of setups) {
    if (opened >= available || setup.gateScore < 5) break;
    if (openCoins.has(setup.coin)) continue;
    const price = state.get('prices')[setup.coin] ?? setup.price;
    if (!price) continue;
    try {
      const calc = calculate({ entry: price, size: settings.size, leverage: settings.leverage, side: setup.side });
      const pos  = state.addPosition({ coin:setup.coin, side:setup.side, entry:price,
        size:settings.size, leverage:settings.leverage, tp:calc.tp, sl:calc.sl,
        isAuto:true, gateScore:setup.gateScore });
      if (pos) { openCoins.add(setup.coin); opened++; alertEntry(); }
    } catch(_) {}
  }
}

function startScanner(ms = 60000) { stopScanner(); scanAll(); _scanTimer = setInterval(scanAll, ms); }
function stopScanner()            { if (_scanTimer) { clearInterval(_scanTimer); _scanTimer = null; } }

function _calcRsi(closes, period) {
  if (closes.length < period+1) return 50;
  let gains=0, losses=0;
  for (let i=1; i<=period; i++) { const d=closes[i]-closes[i-1]; d>0?gains+=d:losses-=d; }
  let ag=gains/period, al=losses/period;
  for (let i=period+1; i<closes.length; i++) {
    const d=closes[i]-closes[i-1];
    ag=(ag*(period-1)+Math.max(d,0))/period; al=(al*(period-1)+Math.max(-d,0))/period;
  }
  if (al===0) return 100;
  return 100-100/(1+ag/al);
}
function _avg(arr) { return arr.length ? arr.reduce((s,v)=>s+v,0)/arr.length : 0; }

/* ═══════════════════════════════════════════════
   9. MODULES / TRACKER (çoklu pozisyon)
   ═══════════════════════════════════════════════ */

let _trackUnsub    = null;
let _durTimers     = {};   // id → timer
let _slWarnFired   = {};   // id → bool

function startTracking() {
  // Zaten dinliyorsa tekrar kurma
  if (_trackUnsub) return;
  _trackUnsub = state.on('price', ({ coin, price }) => {
    const positions = state.get('positions');
    const matching  = positions.filter(p => p.coin === coin);
    if (!matching.length) return;

    matching.forEach(pos => {
      // TP/SL kontrolü
      const hitTp = pos.side==='LONG' ? price>=pos.tp : price<=pos.tp;
      const hitSl = pos.side==='LONG' ? price<=pos.sl : price>=pos.sl;

      if (hitTp) { alertTpHit(); flashGreen(); _closePos(pos, price, 'tp'); return; }
      if (hitSl) { alertSlHit(); _closePos(pos, price, 'sl'); return; }

      // SL %20 yakınlık uyarısı
      const slTotal = Math.abs(pos.entry - pos.sl);
      const dsl     = pos.distanceToSl ?? slTotal;
      if (!_slWarnFired[pos.id] && slTotal>0 && dsl/slTotal < 0.2) {
        _slWarnFired[pos.id] = true;
        alertSlWarning(); shakeRed();
        state.emit('position:sl_warning', pos);
      }
    });
  });
}

function stopTracking() {
  if (_trackUnsub) { _trackUnsub(); _trackUnsub = null; }
  Object.values(_durTimers).forEach(t => clearTimeout(t));
  _durTimers = {};
  _slWarnFired = {};
}

// Pozisyon aç — tracker yoksa başlat, süre timer'ı kur
function openAndTrack(posData) {
  const pos = state.addPosition(posData);
  if (!pos) return null;
  startTracking();
  _slWarnFired[pos.id] = false;
  _durTimers[pos.id] = setTimeout(() => {
    const positions = state.get('positions');
    if (positions.find(p => p.id === pos.id)) state.emit('position:overtime', pos);
  }, 10 * 60 * 1000);
  return pos;
}

function closeManually(posId) {
  const pos = state.get('positions').find(p => p.id === posId);
  if (!pos) return;
  _closePos(pos, pos.currentPrice ?? pos.entry, 'manual');
}

function _closePos(pos, exitPrice, reason) {
  // Timer temizle
  if (_durTimers[pos.id]) { clearTimeout(_durTimers[pos.id]); delete _durTimers[pos.id]; }
  delete _slWarnFired[pos.id];

  const pnl = calcLivePnl(pos, exitPrice).unrealizedPnl;
  recordTrade(pnl);
  addToHistory({ ...pos, exitPrice, pnl, reason, duration: Date.now() - pos.openTime });
  state.removePosition(pos.id);
  state.emit('position:closed', { ...pos, exitPrice, pnl, reason });

  // Tüm pozisyonlar kapandıysa tracker'ı durdur
  if (state.get('positions').length === 0) stopTracking();
}

      card.remove();
      _posCardMap.delete(id);

  // Yeni pozisyon kartları ekle
  positions.forEach(pos => {
    if (!_posCardMap.has(pos.id)) {
      const { card, refs } = _buildSinglePosCard(pos);
      _posListEl.appendChild(card);
      _posCardMap.set(pos.id, { card, refs });

  // Mevcut kartların PnL ve fiyatını güncelle
  positions.forEach(pos => {
    const entry = _posCardMap.get(pos.id);
    if (!entry) return;
    const { refs } = entry;
    const pnl = pos.unrealizedPnl ?? 0;
    refs.pnl.textContent   = (pnl>=0?'+':'')+'$'+pnl.toFixed(2);

  if (positions.length === 0) {

function _buildTradeSummaryRow(title, trade, color) {
  const sec  = _E('div','background:#111d2b;border-radius:10px;padding:12px;margin-bottom:8px');

  coin.textContent = trade.coin+' '+trade.side;

  main.appendChild(coin); main.appendChild(pnl);
  const meta = _E('div','font-size:11px;color:'+C.muted+';margin-top:4px');

function _fmtDur(secs) {
  const m=Math.floor(secs/60), s=secs%60;
  return m>0 ? m+'dk '+s+'s' : s+'s';
}

/* ═══════════════════════════════════════════════

   ═══════════════════════════════════════════════ */

function _fmtP(p) {
  if (!p && p!==0) return '—';
  if (p>=1000) return p.toFixed(2);
  if (p>=1)    return p.toFixed(4);
  return p.toFixed(6);
}
